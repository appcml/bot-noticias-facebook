name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:  # Permite ejecución manual

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial previo
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado con $(cat historial_publicaciones.json | grep -o '"urls"' | wc -l) entradas"
          cat historial_publicaciones.json | head -20
        else
          echo "⚠️ Sin historial previo, se creará nuevo"
          echo '{"urls": [], "titulos": [], "ultima_publicacion": null}' > historial_publicaciones.json
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        pip list
        
    - name: Verificar archivos
      run: |
        echo "📁 Archivos en el directorio:"
        ls -la
        if [ -f "bot_noticias.py" ]; then
          echo "✅ bot_noticias.py encontrado"
        else
          echo "❌ bot_noticias.py NO encontrado"
          echo "🔍 Buscando archivos .py:"
          find . -name "*.py" -type f 2>/dev/null || echo "No hay archivos .py"
        fi
      shell: bash
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}  # ✅ AGREGADO
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      run: |
        echo "🚀 Iniciando bot..."
        python bot_noticias.py
        echo "✅ Bot finalizado con código: $?"
      shell: bash
      
    - name: Verificar historial actualizado
      if: always()
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "📊 Historial actualizado:"
          cat historial_publicaciones.json | python3 -m json.tool 2>/dev/null || cat historial_publicaciones.json
        else
          echo "⚠️ No se encontró historial después de ejecutar"
        fi
      shell: bash
      
    - name: Guardar historial
      if: always()  # ✅ Se ejecuta siempre, incluso si falla el bot
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: historial_publicaciones.json
        retention-days: 90
        overwrite: true
