name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # Necesario para artifacts
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial previo
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado"
          cat historial_publicaciones.json | head -c 200
        else
          echo "⚠️ Sin historial previo, creando nuevo"
          echo '{"urls": [], "titulos": [], "ultima_publicacion": null}' > historial_publicaciones.json
        fi
        echo ""
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow feedparser
        echo "✅ Dependencias instaladas"
        
    - name: Verificar archivos
      run: |
        echo "📁 Archivos en el directorio:"
        ls -la
        if [ ! -f "bot_noticias.py" ]; then 
          echo "❌ ERROR: bot_noticias.py no encontrado"
          exit 1
        fi
        echo "✅ bot_noticias.py encontrado"
      shell: bash
      
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}  # IA gratuita
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      run: |
        echo "🚀 Iniciando bot de noticias..."
        python bot_noticias.py
        echo "🏁 Bot finalizado con código: $?"
      shell: bash
      
    - name: Verificar historial actualizado
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial actualizado"
          cat historial_publicaciones.json | head -c 300
        else
          echo "⚠️ No se generó historial"
        fi
        echo ""
      shell: bash
      
    - name: Guardar historial
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: historial_publicaciones.json
        retention-days: 90
        overwrite: true
