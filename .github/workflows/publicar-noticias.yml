name: Bot Noticias Facebook

on:
  # Ejecutar cada 60 minutos (1 hora)
  schedule:
    - cron: '0 * * * *'  # Al minuto 0 de cada hora
  
  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # ← CORREGIDO: v3 → v4
    
    - name: Set up Python
      uses: actions/setup-python@v5  # ← CORREGIDO: v4 → v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 pillow
    
    - name: Run bot
      env:
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
      run: python bot_noticias.py
    
    - name: Save state
      uses: actions/upload-artifact@v4  # ← CORREGIDO: v3 → v4
      if: always()
      with:
        name: bot-state-${{ github.run_number }}  # ← CORREGIDO: nombre único requerido en v4
        path: data/
        retention-days: 30
        overwrite: true  # ← NUEVO: permitir sobrescribir
