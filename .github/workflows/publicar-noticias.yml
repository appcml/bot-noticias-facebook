name: Publicar Noticias Virales

on:
  schedule:
    # Ejecutar cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # Actualizado a v4
    
    - name: Set up Python
      uses: actions/setup-python@v5  # Actualizado a v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests Pillow
    
    - name: Ejecutar bot de noticias
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      run: python bot_noticias.py
    
    - name: Guardar historial
      uses: actions/upload-artifact@v4  # Actualizado a v4 (esto soluciona el error)
      if: always()
      with:
        name: historial-noticias-${{ github.run_number }}
        path: historial_publicaciones.json
        retention-days: 30
        overwrite: true  # Necesario en v4 si el nombre ya existe
