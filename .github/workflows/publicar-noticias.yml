name: Bot de Noticias Facebook

on:
  schedule:
    # Ejecutar cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Permite ejecución manual
  push:               # Se ejecuta al hacer push (para pruebas)

# Prevenir ejecuciones simultáneas
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4
      
    - name: Instalar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 pillow
        
    # IMPORTANTE: Descargar historial de ejecuciones anteriores
    - name: Descargar historial anterior
      uses: actions/download-artifact@v4
      continue-on-error: true  # No falla si es la primera ejecución
      with:
        name: historial-publicaciones
        path: .
        
    - name: Verificar archivos
      run: |
        echo "Archivos en el directorio:"
        ls -la
        if [ -f historial_publicaciones.json ]; then
          echo "✅ Historial encontrado"
          cat historial_publicaciones.json | head -20
        else
          echo "⚠️ No hay historial previo (primera ejecución)"
        fi
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      run: python bot_noticias.py
      
    # IMPORTANTE: Guardar historial para la siguiente ejecución
    - name: Guardar historial
      uses: actions/upload-artifact@v4
      if: always()  # Se ejecuta incluso si falla
      with:
        name: historial-publicaciones
        path: historial_publicaciones.json
        retention-days: 30
        overwrite: true
        
    - name: Verificar resultado
      if: failure()
      run: |
        echo "❌ El bot falló. Revisa los logs arriba."
