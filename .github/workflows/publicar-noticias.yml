name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:  # Permite ejecución manual

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial previo
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado"
          cat historial_publicaciones.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'📊 {len(d[\\\"urls\\\"])} noticias guardadas')" 2>/dev/null || echo "📄 Archivo existe"
        else
          echo "⚠️ Creando historial nuevo"
          echo '{"urls": [], "titulos": [], "fechas": {}}' > historial_publicaciones.json
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        echo "✅ Dependencias instaladas"
        
    - name: Verificar archivos
      run: |
        ls -la *.py 2>/dev/null || echo "Buscando Python files..."
        if [ ! -f "bot_noticias.py" ]; then
          echo "❌ bot_noticias.py no encontrado"
          exit 1
        fi
        echo "✅ bot_noticias.py listo"
      shell: bash
      
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      run: |
        echo "🚀 Iniciando bot de noticias..."
        python bot_noticias.py
        echo "🏁 Bot finalizado"
      shell: bash
      
    - name: Verificar historial actualizado
      if: always()
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "📊 Historial actualizado:"
          cat historial_publicaciones.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'Total: {len(d[\\\"urls\\\"])} noticias')" 2>/dev/null || echo "✅ OK"
        fi
      shell: bash
      
    - name: Guardar historial
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: historial_publicaciones.json
        retention-days: 90
        overwrite: true
