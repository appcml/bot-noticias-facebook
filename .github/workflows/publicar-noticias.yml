name: Bot Noticias Facebook

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu
      
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser beautifulsoup4 pillow
      
      - name: Crear directorio data
        run: mkdir -p data
      
      - name: Ejecutar bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          HISTORIAL_PATH: data/historial_publicaciones.json
          ESTADO_PATH: data/estado_bot.json
        run: python bot_noticias.py
      
      - name: Guardar datos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-data
          path: data/
          retention-days: 30
