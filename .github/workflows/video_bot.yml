name: 🎬 Video Bot — Verdad Hoy

on:
  schedule:
    # 3 veces al día en horarios pico para audiencia latinoamericana (UTC)
    # 13:00 UTC = 08:00 MX / 09:00 CO / 10:00 AR
    - cron: '0 13 * * *'
    # 18:00 UTC = 13:00 MX / 14:00 CO / 15:00 AR
    - cron: '0 18 * * *'
    # 23:00 UTC = 18:00 MX / 19:00 CO / 20:00 AR
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar publicación ignorando límites de tiempo'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generar-video:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements_video.txt

      - name: 📦 Instalar dependencias de video
        run: |
          pip install --upgrade pip
          pip install -r requirements_video.txt

      - name: 🎞️ Instalar FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: 🎬 Ejecutar Video Bot
        env:
          # ── IA ──────────────────────────────────
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          # ── Noticias ────────────────────────────
          GNEWS_API_KEY:        ${{ secrets.GNEWS_API_KEY }}
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          # ── Imágenes ────────────────────────────
          PIXABAY_API_KEY:      ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          # ── Facebook ────────────────────────────
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:      ${{ secrets.FB_ACCESS_TOKEN }}
          # ── WordPress ───────────────────────────
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:      ${{ secrets.WP_APP_PASSWORD }}
          # ── Control ─────────────────────────────
          FORZAR_VIDEO:         ${{ github.event.inputs.forzar || 'false' }}
          HISTORIAL_PATH:       historial_videos.json
          ESTADO_VIDEO_PATH:    estado_video_bot.json
        run: python video_bot.py

      - name: 💾 Guardar historial (git push)
        if: always()
        run: |
          git config user.name  "Video Bot"
          git config user.email "bot@verdadhoy.com"
          git add historial_videos.json estado_video_bot.json || true
          git diff --staged --quiet || git commit -m "🎬 Video publicado: $(date +'%Y-%m-%d %H:%M') UTC"
          git push || echo "Sin cambios para pushear"
