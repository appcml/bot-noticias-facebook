name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado"
        else
          echo "⚠️ Sin historial previo"
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: pip install requests pillow feedparser
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
