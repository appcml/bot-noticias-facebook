name: Bot Noticias Facebook
on:
  schedule:
    # Corre cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar publicación inmediata (omite control de tiempo y horario)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para git push y para eliminar archivos de pending_videos

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          # ── APIs de Noticias ──────────────────────────────
          NEWS_API_KEY:         ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY:     ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY:        ${{ secrets.GNEWS_API_KEY }}

          # ── Facebook ──────────────────────────────────────
          FB_PAGE_ID:           ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:      ${{ secrets.FB_ACCESS_TOKEN }}

          # ── WordPress ─────────────────────────────────────
          WP_URL:               ${{ secrets.WP_URL }}
          WP_USER:              ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:      ${{ secrets.WP_APP_PASSWORD }}

          # ── Pinterest ─────────────────────────────────────
          PINTEREST_TOKEN:      ${{ secrets.PINTEREST_TOKEN }}

          # ── IA (OpenRouter / OpenAI) ──────────────────────
          OPENROUTER_API_KEY:   ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}

          # ── YouTube ───────────────────────────────────────
          YOUTUBE_API_KEY:      ${{ secrets.YOUTUBE_API_KEY }}

          # ── GitHub (para pending_videos) ──────────────────
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}

          # ── Control ───────────────────────────────────────
          HISTORIAL_PATH:       historial_publicaciones.json
          ESTADO_PATH:          estado_bot.json
          FORZAR_PUBLICACION:   ${{ github.event.inputs.forzar || 'false' }}

        run: python bot_noticias.py

      # ──────────────────────────────────────────────────────
      # GUARDAR TODOS LOS ARCHIVOS DE ESTADO EN EL REPO
      # Sin este paso el bot repite noticias y pierde control
      # ──────────────────────────────────────────────────────
      - name: Guardar estado en repositorio
        if: always()
        run: |
          git config user.name  "bot-noticias[bot]"
          git config user.email "bot-noticias@users.noreply.github.com"

          ARCHIVOS=(
            historial_publicaciones.json
            estado_bot.json
            estado_wp.json
            estado_fb.json
            estado_formato_fb.json
            estado_cuotas.json
            estado_pending_videos.json
          )

          CAMBIOS=0
          for archivo in "${ARCHIVOS[@]}"; do
            if [ -f "$archivo" ]; then
              git add "$archivo"
              CAMBIOS=1
            fi
          done

          git add -A pending_videos/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "ℹ️ Sin cambios en estado — no se hace commit"
          else
            git commit -m "📰 Estado actualizado [skip ci]"
            git push
            echo "✅ Estado guardado en repositorio"
          fi

      - name: Subir artefacto de estado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-state-${{ github.run_number }}
          path: |
            historial_publicaciones.json
            estado_bot.json
            estado_wp.json
            estado_fb.json
            estado_cuotas.json
            estado_pending_videos.json
          retention-days: 7
