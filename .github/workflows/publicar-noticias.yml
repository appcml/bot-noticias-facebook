name: Bot Noticias Facebook - Cada 30 min

on:
  schedule:
    # Ejecutar cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 pillow
        
    - name: Ejecutar bot de noticias
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        HISTORIAL_PATH: data/historial_publicaciones.json
        ESTADO_PATH: data/estado_bot.json
      run: python bot_noticias.py
        
    - name: Guardar historial en repositorio
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || git commit -m "📝 Actualizar historial [$(date +%Y-%m-%d_%H:%M)]"
        git push
