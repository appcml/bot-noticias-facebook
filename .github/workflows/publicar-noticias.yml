name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial (v4)
      id: download-historial
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: ./data
      continue-on-error: true
      
    - name: Mover historial a raíz si existe
      run: |
        if [ -f "./data/historial_publicaciones.json" ]; then
          mv ./data/historial_publicaciones.json ./
          echo "✅ Historial restaurado"
        else
          echo "⚠️ No hay historial previo (primera ejecución o artifact expirado)"
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      run: python bot_noticias.py
      
    - name: Preparar directorio para upload
      if: always()
      run: |
        mkdir -p ./output
        if [ -f "historial_publicaciones.json" ]; then
          cp historial_publicaciones.json ./output/
          echo "📦 Historial listo para guardar"
        fi
      shell: bash
      
    - name: Guardar historial (v4)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: ./output/historial_publicaciones.json
        retention-days: 90
        if-no-files-found: ignore
