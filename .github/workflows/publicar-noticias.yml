name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:  # Permite ejecución manual

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Descargar historial previo
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Crear historial si no existe
      run: |
        if [ ! -f "historial_publicaciones.json" ]; then
          echo "⚠️ Creando historial nuevo"
          echo '{"urls": [], "titulos": [], "ultima_publicacion": null, "videos": []}' > historial_publicaciones.json
          echo "✅ Historial creado"
        else
          echo "✅ Historial encontrado"
          cat historial_publicaciones.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'📊 {len(d[\\\"urls\\\"])} URLs, {len(d.get(\\\"videos\\\", []))} videos')" 2>/dev/null || echo "📄 Archivo válido"
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        # Instalar yt-dlp para descargar videos
        sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
        sudo chmod a+rx /usr/local/bin/yt-dlp
        yt-dlp --version
        echo "✅ Dependencias instaladas"
        
    - name: Verificar archivos
      run: |
        echo "📁 Archivos en el directorio:"
        ls -la *.py *.json 2>/dev/null || ls -la
        if [ -f "bot_noticias.py" ]; then
          echo "✅ bot_noticias.py OK"
        else
          echo "❌ bot_noticias.py NO encontrado"
          exit 1
        fi
      shell: bash
      
    - name: Verificar secrets
      run: |
        echo "🔍 Verificando configuración..."
        if [ -z "${{ secrets.FB_PAGE_ID }}" ]; then
          echo "❌ FB_PAGE_ID no configurado"
        else
          echo "✅ FB_PAGE_ID configurado"
        fi
        if [ -z "${{ secrets.FB_ACCESS_TOKEN }}" ]; then
          echo "❌ FB_ACCESS_TOKEN no configurado"
        else
          echo "✅ FB_ACCESS_TOKEN configurado"
        fi
        if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
          echo "⚠️ OPENAI_API_KEY no configurado"
        else
          echo "✅ OPENAI_API_KEY configurado"
        fi
      shell: bash
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      run: |
        echo "🚀 Iniciando bot..."
        python bot_noticias.py
      shell: bash
      
    - name: Verificar historial actualizado
      if: always()
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "📊 Historial final:"
          cat historial_publicaciones.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'URLs: {len(d[\\\"urls\\\"])}, Videos: {len(d.get(\\\"videos\\\", []))}, Última: {d.get(\\\"ultima_publicacion\\\",\\\"N/A\\\")[:19] if d.get(\\\"ultima_publicacion\\\") else \\\"N/A\\\"}')" 2>/dev/null || echo "✅ Archivo actualizado"
        else
          echo "⚠️ No se encontró historial después de ejecutar"
        fi
      shell: bash
      
    - name: Guardar historial
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: historial_publicaciones.json
        retention-days: 90
        overwrite: true
