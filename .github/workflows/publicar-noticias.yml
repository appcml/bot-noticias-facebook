name: Bot Noticias Facebook
on:
  schedule:
    # Corre cada hora — el bot mismo verifica si han pasado 55 min
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  publicar:
    runs-on: ubuntu-latest
    # Permiso de escritura para poder hacer git push del historial
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          # Necesario para que git push funcione
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y espeak espeak-data ffmpeg

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY:  ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY:     ${{ secrets.GNEWS_API_KEY }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:   ${{ secrets.FB_ACCESS_TOKEN }}
          HISTORIAL_PATH:    historial_publicaciones.json
          ESTADO_PATH:       estado_bot.json
        run: python bot_noticias.py

      # ─────────────────────────────────────────────────────
      # PASO CRÍTICO: Guardar historial de vuelta en el repo
      # Sin esto, el historial se pierde y el bot repite noticias
      # ─────────────────────────────────────────────────────
      - name: Guardar historial en repositorio
        if: always()
        run: |
          git config user.name  "bot-noticias[bot]"
          git config user.email "bot-noticias@users.noreply.github.com"
          if git diff --quiet historial_publicaciones.json estado_bot.json 2>/dev/null; then
            echo "ℹ️ Sin cambios en historial — no se hace commit"
          else
            git add historial_publicaciones.json estado_bot.json
            git commit -m "📰 Historial actualizado [skip ci]"
            git push
            echo "✅ Historial guardado en repositorio"
          fi

      - name: Subir artefacto de estado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-state-${{ github.run_number }}
          path: |
            historial_publicaciones.json
            estado_bot.json
          retention-days: 7
