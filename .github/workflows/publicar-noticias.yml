name: Bot Noticias Facebook

on:
  schedule:
    # Corre cada 30 minutos — WordPress publica cada 30 min, Facebook solo en horario pico
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      forzar:
        description: 'Forzar publicación inmediata (omite control de tiempo y horario)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias del sistema
        run: sudo apt-get install -y espeak espeak-data ffmpeg

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Ejecutar bot
        env:
          # APIs de noticias
          NEWS_API_KEY:        ${{ secrets.NEWS_API_KEY }}
          NEWSDATA_API_KEY:    ${{ secrets.NEWSDATA_API_KEY }}
          GNEWS_API_KEY:       ${{ secrets.GNEWS_API_KEY }}
          # Facebook
          FB_PAGE_ID:          ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:     ${{ secrets.FB_ACCESS_TOKEN }}
          # WordPress — NUEVO V6
          WP_URL:              ${{ secrets.WP_URL }}
          WP_USER:             ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          # Rutas historial
          HISTORIAL_PATH:      historial_publicaciones.json
          ESTADO_PATH:         estado_bot.json
          FORZAR_PUBLICACION:  ${{ github.event.inputs.forzar || 'false' }}
        run: python bot_noticias.py

      - name: Guardar historial en repositorio
        if: always()
        run: |
          git config user.name  "bot-noticias[bot]"
          git config user.email "bot-noticias@users.noreply.github.com"
          git add -f historial_publicaciones.json estado_bot.json estado_wp.json estado_fb.json estado_formato_fb.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "ℹ️ Sin cambios en historial — no se hace commit"
          else
            git commit -m "📰 Historial actualizado [skip ci]"
            git push
            echo "✅ Historial guardado en repositorio"
          fi

      - name: Subir artefacto de estado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bot-state-${{ github.run_number }}
          path: |
            historial_publicaciones.json
            estado_bot.json
            estado_wp.json
            estado_fb.json estado_formato_fb.json
          retention-days: 7
