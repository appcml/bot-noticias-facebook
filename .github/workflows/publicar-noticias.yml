name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      
    - name: Intentar descargar historial
      id: download
      uses: actions/download-artifact@v4
      with:
        name: historial-noticias
        path: .
      continue-on-error: true
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado"
          cat historial_publicaciones.json | head -20
        else
          echo "⚠️ No hay historial previo, se creará nuevo"
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      run: python bot_noticias.py
      
    - name: Verificar archivo generado
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Archivo de historial existe"
          ls -lh historial_publicaciones.json
        else
          echo "⚠️ No se generó archivo de historial"
        fi
      shell: bash
      
    - name: Guardar historial
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: historial-noticias
        path: historial_publicaciones.json
        retention-days: 90
        if-no-files-found: warn
        overwrite: true
