name: Bot Noticias Facebook - Cada 30 min

on:
  schedule:
    # Ejecutar cada 30 minutos
    - cron: '*/30 * * * *'
  workflow_dispatch:  # Permite ejecución manual

jobs:
  publicar:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout del código
      uses: actions/checkout@v4
      
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 pillow
        
    - name: Descargar historial y estado
      uses: actions/download-artifact@v4
      with:
        name: bot-data
        path: ./data/
      continue-on-error: true
      
    - name: Ejecutar bot de noticias
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        HISTORIAL_PATH: ./data/historial_publicaciones.json
        ESTADO_PATH: ./data/estado_bot.json
      run: |
        mkdir -p ./data
        python bot_noticias.py
        
    - name: Subir datos actualizados
      uses: actions/upload-artifact@v4
      with:
        name: bot-data
        path: |
          ./data/historial_publicaciones.json
          ./data/estado_bot.json
        retention-days: 90
