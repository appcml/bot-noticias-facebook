name: Publicar Noticias Virales

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permiso para hacer push
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}  # Token para poder hacer push
      
    - name: Verificar historial
      run: |
        if [ -f "historial_publicaciones.json" ]; then
          echo "✅ Historial encontrado en repo"
          cat historial_publicaciones.json | head -20
        else
          echo "⚠️ No hay historial, se creará"
        fi
      shell: bash
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        pip install requests pillow feedparser
        
    - name: Ejecutar bot
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      run: python bot_noticias.py
      
    - name: Commit y push del historial
      if: always()
      run: |
        git config --local user.email "bot@github.com"
        git config --local user.name "Bot Noticias"
        
        if [ -f "historial_publicaciones.json" ]; then
          git add historial_publicaciones.json
          git diff --staged --quiet || git commit -m "Update: Historial de noticias publicadas"
          git push || echo "No hay cambios para push"
        fi
      shell: bash
